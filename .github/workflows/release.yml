name: Release Dashboard

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    name: Build Multi-Arch Binaries
    runs-on: ubuntu-latest
    strategy:
      matrix:
        goos: [linux]
        goarch: [amd64, arm64]

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js (Build Frontend)
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install Frontend Dependencies
        working-directory: frontend
        run: npm install

      - name: Build Frontend
        working-directory: frontend
        run: npm run build

      - name: Setup Go (Build Backend)
        uses: actions/setup-go@v5
        with:
          go-version: '1.23'

      - name: Install Go Dependencies
        run: go mod tidy

      - name: Build Binary
        run: |
          CGO_ENABLED=0 GOOS=${{ matrix.goos }} GOARCH=${{ matrix.goarch }} \
          go build -ldflags "-s -w -X 'main.Version=${{ github.ref_name }}'" -o vps-dash-${{ matrix.goos }}-${{ matrix.goarch }} main.go

      - name: Release to GitHub
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: vps-dash-${{ matrix.goos }}-${{ matrix.goarch }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
